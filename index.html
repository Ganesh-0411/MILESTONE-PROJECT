<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Booking Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at 20% 30%, #ff416c33, transparent 40%),
                radial-gradient(circle at 80% 70%, #4facfe33, transparent 40%),
                linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    overflow-x: hidden;
}

/* ================= LOGIN / REGISTER CARD ================= */
.auth-container {
    width: 380px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 30px rgba(0,0,0,0.4);
    text-align: center;
    color: #fff;
    position: relative;
    transition: 0.4s ease;
}

.auth-container h2 {
    margin-bottom: 25px;
    font-weight: 600;
    font-size: 28px;
    background: linear-gradient(45deg,#ff416c,#4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.auth-container input {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 14px;
    transition: 0.3s;
}

.auth-container input:focus {
    box-shadow: 0 0 15px #ff416c;
    background: rgba(255,255,255,0.25);
}

.auth-container button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg,#ff416c,#4facfe);
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.auth-container button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ff416c;
}

.switch-link {
    margin-top: 15px;
    font-size: 13px;
    cursor: pointer;
    color: #ddd;
}

.switch-link span {
    color: #4facfe;
    font-weight: 600;
}

/* ================= BOOKING CONTAINER ================= */
#bookingContainer {
    display: none;
    width: 90%;
    max-width: 1200px;
    margin: 40px auto;
    color: white;
    text-align: center;
}

/* ================= SEARCH ================= */
#searchInput {
    width: 50%;
    padding: 12px;
    border-radius: 30px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: #fff;
    margin-bottom: 30px;
}

/* ================= EVENT CARDS ================= */
.event-card {
    display: inline-block;
    width: 240px;
    margin: 15px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    transition: 0.4s;
}

.event-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 25px #4facfe;
}

.event-card img {
    width: 100%;
    border-radius: 15px;
}

.event-card button {
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(45deg,#ff416c,#4facfe);
    color: white;
    cursor: pointer;
}

/* ================= MODAL ================= */
#bookingModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

#bookingForm {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
}

#bookingForm input {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

</style>
</head>
<body>

<!-- ================= AUTH SECTION ================= -->
<div class="auth-container" id="authContainer">

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <h2>Login</h2>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="login()">Login</button>
        <div class="switch-link">
            Don't have an account? <span onclick="showRegister()">Register</span>
        </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" style="display:none;">
        <h2>Register</h2>
        <input type="text" id="regUser" placeholder="Username">
        <input type="password" id="regPass" placeholder="Password">
        <button onclick="register()">Create Account</button>
        <div class="switch-link">
            Already have an account? <span onclick="showLogin()">Login</span>
        </div>
    </div>

</div>

<!-- ================= BOOKING SECTION ================= -->
<div id="bookingContainer">
    <h2>Welcome! Select an Event</h2>
    <input type="text" id="searchInput" placeholder="Search events..." oninput="searchEvents()">
    <div id="eventContainer"></div>
    <div id="confirmation"></div>
</div>

<!-- ================= MODAL ================= -->
<div id="bookingModal">
    <div id="bookingForm">
        <h3 id="selectedEventName"></h3>
        <input type="text" id="name" placeholder="Your Name">
        <input type="number" id="tickets" placeholder="Number of Tickets" min="1">
        <button onclick="confirmBooking()">Confirm Booking</button>
        <button onclick="closeModal()" style="background:#d32f2f;margin-top:8px;">Cancel</button>
    </div>
</div>

<script src="script.js"></script>

<script>
function showRegister() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
}

function showLogin() {
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
}
</script>

</body>
</html>
